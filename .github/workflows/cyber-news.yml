name: Cybersecurity News Updates

on:
  schedule:
    - cron: '30 10 * * 2,4'   # Tuesday & Thursday at 4:00 PM IST
  workflow_dispatch:

jobs:
  update-cyber-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get install -y jq

      - name: Fetch cybersecurity news
        run: |
          curl -s https://feeds.feedburner.com/TheHackersNews > feed.xml
          
          echo "# 🔐 Cybersecurity News" > CYBERSECURITY_NEWS.md
          echo "" >> CYBERSECURITY_NEWS.md
          echo "Last updated: $(date)" >> CYBERSECURITY_NEWS.md
          echo "" >> CYBERSECURITY_NEWS.md
          
          grep -oP '(?<=<title>).*?(?=</title>)' feed.xml | head -n 10 | tail -n +2 | while read line
          do
            echo "- $line" >> CYBERSECURITY_NEWS.md
          done

      - name: Commit and push changes
        run: |
          git config user.name "AryaVeerJai"
          git config user.email "aryansingh879791@gmail.com"
          git add CYBERSECURITY_NEWS.md
          git diff --cached --quiet || git commit -m "Cybersecurity news update"
          git push
